apiVersion: apps/v1
kind: Deployment

metadata:
  name: enterprise-devops-app
  labels:
    app: enterprise-devops-app
spec:
  replicas: 1

  selector:
    matchLabels:
      app: enterprise-devops-app

  template:
    metadata:
      labels:
        app: enterprise-devops-app

    spec:
      containers:
        - name: enterprise-devops-app
          image: alfi-teachs/enterprise-devops-app:v1
          ports:
            - containerPort: 80